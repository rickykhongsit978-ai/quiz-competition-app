<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz Competition - Register</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

.navbar{
    background:#2c3e50;
    color:white;
    padding:15px 30px;
    text-align:center;
}

.navbar h1{
    font-size:24px;
}

.container{
    width:100%;
    max-width:500px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#2c3e50;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:5px;
    background:#3498db;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

.login-link{
    text-align:center;
    margin-top:15px;
}

.login-link a{
    color:#3498db;
    text-decoration:none;
}

.success{
    color:green;
    text-align:center;
    margin-top:15px;
}

</style>
</head>
<body>

<div class="navbar">
    <h1>🏆 Quiz Competition App</h1>
</div>

<div class="container">

    <h2>Participant Registration</h2>

    <form id="registerForm">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" required>
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit">
            Register Now
        </button>

    </form>

    <div id="message" class="success"></div>

    <div class="login-link">
        Already registered?
        <a href="index.html">Start Quiz</a>
    </div>

</div>

<script>

document.getElementById("registerForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    let name =
    document.getElementById("name").value;

    let email =
    document.getElementById("email").value;

    let phone =
    document.getElementById("phone").value;

    let username =
    document.getElementById("username").value;

    let password =
    document.getElementById("password").value;

    let users =
    JSON.parse(localStorage.getItem("quizUsers"))
    || [];

    users.push({
        name:name,
        email:email,
        phone:phone,
        username:username,
        password:password
    });

    localStorage.setItem(
        "quizUsers",
        JSON.stringify(users)
    );

    document.getElementById("message")
    .innerHTML =
    "✅ Registration Successful! Redirecting to Quiz...";

    setTimeout(() => {

        localStorage.setItem(
            "currentPlayer",
            name
        );

        window.location.href = "index.html";

    },2000);

});

</script>

</body>
</html>
