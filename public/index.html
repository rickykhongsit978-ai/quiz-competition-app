<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz Competition App</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
}

/* Navbar */
.navbar{
    background:#2c3e50;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:22px;
    font-weight:bold;
}

.nav-links{
    list-style:none;
    display:flex;
    gap:20px;
}

.nav-links a{
    color:white;
    text-decoration:none;
}

/* Container */
.container{
    max-width:800px;
    margin:30px auto;
    padding:20px;
}

/* Screens */
.screen{
    display:none;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.screen.active{
    display:block;
}

/* Start Screen */
#playerName{
    width:100%;
    padding:12px;
    margin:15px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    background:#3498db;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

/* Quiz */
.quiz-header{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

#question{
    font-size:22px;
    margin-bottom:20px;
}

.option{
    display:block;
    width:100%;
    margin:10px 0;
    padding:12px;
    border:1px solid #ddd;
    border-radius:5px;
    background:white;
    text-align:left;
    color:black;
}

.option:hover{
    background:#ecf0f1;
}

.correct{
    background:#2ecc71 !important;
    color:white;
}

.wrong{
    background:#e74c3c !important;
    color:white;
}

#nextBtn{
    margin-top:15px;
    display:none;
}

/* Result */
.result-box{
    text-align:center;
}

.score{
    font-size:40px;
    color:#27ae60;
    margin:20px 0;
}

/* Leaderboard */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th,
table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

table th{
    background:#3498db;
    color:white;
}

</style>
</head>
<body>

<nav class="navbar">
    <div class="logo">🏆 Quiz Competition App</div>
    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Quiz</a></li>
        <li><a href="#">Leaderboard</a></li>
    </ul>
</nav>

<div class="container">

    <!-- Start Screen -->
    <div id="startScreen" class="screen active">
        <h2>Welcome to Quiz Competition</h2>
        <p>Enter your name to begin.</p>

        <input
            type="text"
            id="playerName"
            placeholder="Enter Your Name"
        >

        <button onclick="startQuiz()">
            Start Quiz
        </button>
    </div>

    <!-- Quiz Screen -->
    <div id="quizScreen" class="screen">

        <div class="quiz-header">
            <h3 id="playerDisplay"></h3>
            <h3>⏱ <span id="timer">15</span>s</h3>
        </div>

        <h2 id="question"></h2>

        <div id="answers"></div>

        <button id="nextBtn" onclick="nextQuestion()">
            Next Question
        </button>

    </div>

    <!-- Result Screen -->
    <div id="resultScreen" class="screen">
        <div class="result-box">

            <h2>Quiz Completed 🎉</h2>

            <div class="score">
                <span id="finalScore">0</span>
            </div>

            <p id="resultText"></p>

            <button onclick="restartQuiz()">
                Play Again
            </button>

        </div>

        <h2 style="margin-top:30px;">
            Leaderboard
        </h2>

        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="leaderboard">
            </tbody>
        </table>

    </div>

</div>

<script>

const quizData = [
{
    question:"A web developer is responsible for?",
    options:[
        "Building Websites", 
        "Repairing hardware", 
        "Managing bank accounts", 
        "Designing roads"
    ],
    answer:"Building Websites"
},
{
    question:"HTTP stands for?",
    options:[
        "HyperText Transfer Protocol", 
        "High Transfer Text Program", 
        "Hyper Tool Transfer Process", 
        "Home Text Transfer Protocol"

    ],
    answer:"HyperText Transfer Protocol"
},
{
    question:"HTML stands for?",
    options:[
        "Hyper Text Markup Language",
        "High Text Machine Language",
        "Home Tool Markup Language",
        "Hyper Tool Multi Language"
    ],
    answer:"Hyper Text Markup Language"
},
{
    question:"Who invented Java?",
    options:[
        "James Gosling",
        "Bill Gates",
        "Elon Musk",
        "Mark Zuckerberg"
    ],
    answer:"James Gosling"
},
{
    question:"2 + 2 × 5 = ?",
    options:["20","12","10","14"],
    answer:"12"
}
];

let currentQuestion = 0;
let score = 0;
let timer;
let timeLeft = 15;
let playerName = "";

function startQuiz(){

    playerName =
        document.getElementById("playerName").value;

    if(playerName.trim()===""){
        alert("Enter your name");
        return;
    }

    document
        .getElementById("playerDisplay")
        .innerText = "Player: " + playerName;

    document
        .getElementById("startScreen")
        .classList.remove("active");

    document
        .getElementById("quizScreen")
        .classList.add("active");

    loadQuestion();
}

function loadQuestion(){

    clearInterval(timer);

    timeLeft = 15;

    document.getElementById("timer")
    .innerText = timeLeft;

    timer = setInterval(() => {

        timeLeft--;

        document.getElementById("timer")
        .innerText = timeLeft;

        if(timeLeft <= 0){

            clearInterval(timer);

            document
            .getElementById("nextBtn")
            .style.display = "block";
        }

    },1000);

    const q = quizData[currentQuestion];

    document.getElementById("question")
    .innerText = q.question;

    const answers =
    document.getElementById("answers");

    answers.innerHTML = "";

    q.options.forEach(option => {

        const btn =
        document.createElement("button");

        btn.innerText = option;

        btn.classList.add("option");

        btn.onclick = () =>
            checkAnswer(btn, option);

        answers.appendChild(btn);

    });

    document
        .getElementById("nextBtn")
        .style.display = "none";
}

function checkAnswer(button, selected){

    clearInterval(timer);

    const correct =
    quizData[currentQuestion].answer;

    const options =
    document.querySelectorAll(".option");

    options.forEach(opt => {

        opt.disabled = true;

        if(opt.innerText === correct){
            opt.classList.add("correct");
        }

    });

    if(selected === correct){

        score++;

    }else{

        button.classList.add("wrong");

    }

    document
    .getElementById("nextBtn")
    .style.display = "block";
}

function nextQuestion(){

    currentQuestion++;

    if(currentQuestion < quizData.length){

        loadQuestion();

    }else{

        showResult();

    }
}

function showResult(){

    document
        .getElementById("quizScreen")
        .classList.remove("active");

    document
        .getElementById("resultScreen")
        .classList.add("active");

    document
        .getElementById("finalScore")
        .innerText =
        score + " / " + quizData.length;

    document
        .getElementById("resultText")
        .innerText =
        playerName +
        ", you scored " +
        score +
        " points.";

    saveLeaderboard();
}

function saveLeaderboard(){

    let leaderboard =
        JSON.parse(
        localStorage.getItem("leaderboard")
        ) || [];

    leaderboard.push({
        name:playerName,
        score:score
    });

    leaderboard.sort((a,b)=>
        b.score - a.score
    );

    localStorage.setItem(
        "leaderboard",
        JSON.stringify(leaderboard)
    );

    displayLeaderboard();
}

function displayLeaderboard(){

    const board =
    JSON.parse(
        localStorage.getItem("leaderboard")
    ) || [];

    const tbody =
    document.getElementById("leaderboard");

    tbody.innerHTML = "";

    board.slice(0,10).forEach((user,index)=>{

        tbody.innerHTML += `
        <tr>
            <td>${index+1}</td>
            <td>${user.name}</td>
            <td>${user.score}</td>
        </tr>
        `;
    });
}

function restartQuiz(){

    location.reload();
}

displayLeaderboard();

</script>

</body>
</html>
