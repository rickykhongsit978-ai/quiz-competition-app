```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Competition App - Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.login-container{
    width:100%;
    max-width:420px;
    background:#fff;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.logo{
    text-align:center;
    font-size:60px;
    margin-bottom:10px;
}

h1{
    text-align:center;
    color:#333;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#777;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

.form-group input{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

.form-group input:focus{
    outline:none;
    border-color:#4facfe;
}

.login-btn{
    width:100%;
    padding:12px;
    background:#4facfe;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

.login-btn:hover{
    background:#2196f3;
}

.message{
    text-align:center;
    color:red;
    margin-bottom:10px;
}

.demo{
    margin-top:20px;
    background:#f5f5f5;
    padding:10px;
    border-radius:10px;
    text-align:center;
    font-size:14px;
}
</style>
</head>
<body>

<div class="login-container">

    <div class="logo">🏆</div>

    <h1>Quiz Competition App</h1>

    <p class="subtitle">
        Login to Start Quiz
    </p>

    <div id="message" class="message"></div>

    <form id="loginForm">

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit" class="login-btn">
            Login
        </button>

    </form>

    <div class="demo">
        <strong>Demo Login</strong><br>
        Username: admin<br>
        Password: 12345
    </div>

</div>

<script>

document.getElementById("loginForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    let username =
    document.getElementById("username").value;

    let password =
    document.getElementById("password").value;

    if(username === "rimi" &&
       password === "12345"){

        localStorage.setItem(
            "quizUser",
            username
        );

        alert("Login Successful!");

        window.location.href = "index.html";

    }else{

        document.getElementById("message")
        .innerHTML =
        "Invalid Username or Password";

    }

});
</script>

</body>
</html>
```
